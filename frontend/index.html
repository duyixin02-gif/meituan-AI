<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>美甲 AI 试戴平台</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="portal-page">
    <main class="portal-shell portal-shell-compact" aria-label="美甲 AI 试戴平台入口">
      <header class="portal-header">
        <div>
          <span class="brand-mark">AI Nail Studio</span>
          <h1>选择独立入口</h1>
          <p>用户端无需登录，直接进入试戴流程；商家端先完成登录，再进入运营工作台。</p>
        </div>
      </header>

      <section class="role-grid" aria-label="选择入口">
        <a class="role-card role-link-card role-card-user" href="./user-app.html" aria-label="进入用户端试戴">
          <span class="role-label">用户端</span>
          <div>
            <h2>直接使用试戴工具</h2>
            <p>进入后即可上传手图、选择款式、生成试戴效果，并进行收藏、对比或预约。</p>
          </div>
          <strong>打开用户端</strong>
        </a>

        <a class="role-card role-link-card role-card-merchant" href="./merchant-login.html" aria-label="进入商家端登录">
          <span class="role-label">商家端</span>
          <div>
            <h2>登录后进入工作台</h2>
            <p>通过商家账号进入运营侧，查看试戴热度、款式表现和平台趋势。</p>
          </div>
          <strong>前往商家登录</strong>
        </a>
      </section>
    </main>
  </body>
</html>
