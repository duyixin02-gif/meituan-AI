<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>美甲 AI 试戴平台</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="portal-page">
    <main class="portal-shell" aria-label="美甲 AI 试戴平台入口">
      <header class="portal-header">
        <div>
          <span class="brand-mark">AI Nail Studio</span>
          <h1>美甲 AI 试戴平台</h1>
          <p>按角色进入不同工作区：用户端专注试戴、对比和预约，商家端专注经营数据、主推款和活动方案。</p>
        </div>
      </header>

      <section class="role-grid" aria-label="选择入口">
        <a class="role-card role-card-user" href="./user-app.html" aria-label="进入用户端试戴">
          <span class="role-label">用户端</span>
          <div class="role-media">
            <img src="../data/raw/images/hands/hand_001.png" alt="用户手部试戴示例">
            <img src="../data/raw/images/nail_styles_enhanced/style_002_enhanced.png" alt="可试戴美甲款式示例">
          </div>
          <div>
            <h2>试戴选款</h2>
            <p>上传手图，选择款式，生成试戴效果，再收藏、对比或预约到店。</p>
          </div>
          <ul>
            <li>手图上传和示例演示</li>
            <li>款式筛选与详情</li>
            <li>候选款智能对比</li>
          </ul>
          <strong>进入用户端</strong>
        </a>

        <a class="role-card role-card-merchant" href="./merchant-login.html" aria-label="进入商家端登录">
          <span class="role-label">商家端</span>
          <div class="role-metrics" aria-hidden="true">
            <div><span>试戴</span><strong>1,248</strong></div>
            <div><span>收藏率</span><strong>18.6%</strong></div>
            <div><span>主推款</span><strong>法式</strong></div>
          </div>
          <div>
            <h2>运营工作台</h2>
            <p>查看试戴热度、款式表现和平台趋势，把用户行为转成可执行运营动作。</p>
          </div>
          <ul>
            <li>经营指标和趋势图</li>
            <li>款式管理和主推位</li>
            <li>活动方案与内容文案</li>
          </ul>
          <strong>进入商家端</strong>
        </a>
      </section>
    </main>
  </body>
</html>
