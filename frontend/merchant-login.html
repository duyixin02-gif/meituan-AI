<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家登录 - 美甲 AI 运营工作台</title>
    <link rel="stylesheet" href="./merchant-login.css">
  </head>
  <body>
    <main class="login-shell">
      <header class="login-brand" aria-label="商家登录中心">
        <a class="brand-link" href="./index.html" aria-label="返回平台入口">
          <span class="brand-symbol">AI</span>
          <span>
            <strong>美甲 AI 商家中心</strong>
            <small>Nail Studio Merchant Login</small>
          </span>
        </a>
        <nav class="login-nav" aria-label="页面导航">
          <a href="./user-app.html">用户端</a>
          <a href="./index.html">入口页</a>
        </nav>
      </header>

      <section class="login-stage" aria-label="商家账号登录">
        <aside class="login-guide" aria-hidden="true">登录指南</aside>

        <form id="loginForm" class="login-card" action="./merchant-dashboard.html" method="get" novalidate>
          <div class="login-card-head">
            <p class="eyebrow">Merchant Access</p>
            <h1>统一登录中心 Login Center</h1>
            <p>使用商家账号登录，查看试戴数据、款式表现和运营建议。</p>
          </div>

          <div class="login-tabs" role="tablist" aria-label="登录方式">
            <button class="is-active" type="button" role="tab" aria-selected="true">账号密码</button>
            <button type="button" role="tab" aria-selected="false">扫码</button>
            <button type="button" role="tab" aria-selected="false">短信</button>
            <button type="button" role="tab" aria-selected="false">通行密钥</button>
          </div>

          <label class="field">
            <span>商家账号</span>
            <input id="usernameInput" name="merchant" autocomplete="username" value="merchant_001" placeholder="请输入商家账号">
          </label>

          <label class="field">
            <span>登录密码</span>
            <div class="password-field">
              <input id="passwordInput" name="password" type="password" autocomplete="current-password" value="1234567" placeholder="请输入密码">
              <button id="togglePasswordButton" type="button" aria-label="显示密码">显示</button>
            </div>
          </label>

          <div class="form-row">
            <label class="remember-field">
              <input id="rememberInput" type="checkbox">
              <span>记住账号</span>
            </label>
            <button id="forgotButton" class="link-button" type="button">忘记密码？</button>
          </div>

          <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>

          <button class="submit-button" type="submit">立即登录</button>
          <a class="demo-login-link" href="./merchant-dashboard.html?merchant=merchant_001">使用演示账号进入</a>

          <div class="login-help">
            <span>演示账号：merchant_001</span>
            <span>演示密码：1234567</span>
          </div>
        </form>
      </section>
    </main>

    <dialog id="forgotDialog" class="forgot-dialog">
      <form id="forgotForm" method="dialog">
        <div class="dialog-head">
          <div>
            <h2>找回密码</h2>
            <p>输入商家账号或绑定手机号，我们会发送重置指引。</p>
          </div>
          <button id="forgotCloseButton" type="button" aria-label="关闭">×</button>
        </div>
        <label class="field">
          <span>账号 / 手机号</span>
          <input id="recoverInput" autocomplete="username" placeholder="merchant_001 或手机号">
        </label>
        <p id="recoverMessage" class="form-message" role="status" aria-live="polite"></p>
        <div class="dialog-actions">
          <button id="forgotCancelButton" class="secondary-button" type="button">取消</button>
          <button class="submit-button" type="submit">发送重置指引</button>
        </div>
      </form>
    </dialog>

    <script src="./merchant-login.js"></script>
  </body>
</html>
